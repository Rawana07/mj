<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#JayKiMuskan OTT</title>

<link href="https://cdn.jsdelivr.net/npm/bootswatch@5.0.0/dist/slate/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#0b0b0b; color:white; }
.header { text-align:center; margin:20px; color:red; }
.row-scroll { display:flex; overflow-x:auto; gap:15px; padding:10px; }
.card {
  min-width:200px;
  background:#141414;
  border-radius:10px;
  padding:10px;
  transition:0.3s;
}
.card:hover { transform:scale(1.1); box-shadow:0 0 20px red; }
.preview { width:100%; height:120px; object-fit:cover; border-radius:8px; }
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>#JayKiMuskan OTT</h2>
</div>

<!-- LOGIN -->
<div id="loginBox">
<input id="user" class="form-control mb-2" placeholder="Username">
<input id="pass" type="password" class="form-control mb-2" placeholder="Password">
<button onclick="login()" class="btn btn-danger w-100">Login</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<input id="search" class="form-control mb-3" placeholder="🔎 Search..." onkeyup="searchFiles()">

<div id="content"></div>

</div>

</div>

<script>

const API_KEY = "PASTE_API_KEY";
const ROOT = "1zF9LYqZ5tsEjXlNGqc04r6UUAVHVi-Ck";

let allData = [];

// LOGIN
function login(){
  if(user.value==="jaykimuski" && pass.value==="jaykimuski"){
    loginBox.style.display="none";
    main.style.display="block";
    loadFolders();
  } else alert("Wrong Login");
}

// LOAD ROOT FOLDERS (categories)
function loadFolders(){
fetch(`https://www.googleapis.com/drive/v3/files?q='${ROOT}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType)`)
.then(res=>res.json())
.then(data=>{
  showCategories(data.files);
});
}

// SHOW CATEGORY ROWS
function showCategories(folders){
  let html="";
  folders.forEach(folder=>{
    if(folder.mimeType.includes("folder")){
      html += `<h4>${folder.name}</h4><div class="row-scroll" id="${folder.id}"></div>`;
      loadFiles(folder.id);
    }
  });
  content.innerHTML = html;
}

// LOAD FILES INSIDE CATEGORY
function loadFiles(folderId){
fetch(`https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents&key=${API_KEY}&fields=files(id,name,mimeType)`)
.then(res=>res.json())
.then(data=>{
  renderRow(folderId, data.files);
});
}

// RENDER ROW
function renderRow(folderId, files){
  let html="";
  files.forEach(f=>{
    html += `
    <div class="card">
      ${getPreview(f)}
      <small>${f.name}</small>
      <div class="mt-2">
        <a href="https://drive.google.com/file/d/${f.id}/preview" target="_blank" class="btn btn-sm btn-primary">View</a>
        <a href="https://drive.google.com/uc?export=download&id=${f.id}" class="btn btn-sm btn-success">⬇</a>
      </div>
    </div>`;
  });
  document.getElementById(folderId).innerHTML = html;
}

// PREVIEW
function getPreview(f){
  if(f.mimeType.includes("image")){
    return `<img class="preview" src="https://lh3.googleusercontent.com/d/${f.id}">`;
  }
  if(f.mimeType.includes("video")){
    return `<video class="preview" src="https://drive.google.com/uc?id=${f.id}" controls></video>`;
  }
  return `<div class="preview bg-dark d-flex align-items-center justify-content-center">📄</div>`;
}

// SEARCH
function searchFiles(){
  let q = search.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(q) ? "block":"none";
  });
}

</script>

</body>
</html>
